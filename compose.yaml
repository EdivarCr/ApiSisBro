services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: apisisbro-api
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests:ro
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - apisisbro-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: apisisbro-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pimenta_drbroa
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d pimenta_drbroa"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - apisisbro-network
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: apisisbro-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: nette
    depends_on:
      - db
    networks:
      - apisisbro-network
    restart: unless-stopped

volumes:
  postgres_data:
    name: apisisbro-postgres-data

networks:
  apisisbro-network:
    name: apisisbro-network
    driver: bridge